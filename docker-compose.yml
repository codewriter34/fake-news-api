version: "3.8"

services:
  fake-news-api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - HF_REPO=${HF_REPO}
    volumes:
      # Cache downloaded models between restarts — saves time and bandwidth
      - ./models:/app/models
    restart: unless-stopped
